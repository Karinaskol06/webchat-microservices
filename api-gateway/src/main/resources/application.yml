spring:
  codec:
    max-in-memory-size: 12MB
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cloud:
    gateway:
      httpclient:
        connect-timeout: 10000
        response-timeout: 120s
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost"
              - "http://127.0.0.1"
              - "http://localhost:5173"
              - "http://localhost:3000"
              - "http://localhost:8089"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers:
              - "*"
            allow-credentials: true
            max-age: 3600
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - name: JwtValidationFilter

        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**
          filters:
            - name: JwtValidationFilter

        - id: chat-service-presence
          uri: lb://chat-service
          predicates:
            - Path=/api/presence/**
          filters:
            - name: JwtValidationFilter

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: JwtValidationFilter

        # SockJS (/info XHR etc.) inherits CORS from chat-service + gateway globalcors → duplicate ACAO headers; dedupe for browsers
        - id: websocket-service
          uri: lb://chat-service
          predicates:
            - Path=/ws/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin, RETAIN_UNIQUE

  security:
    user:
      name: dummy
      password: dummy

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForLocalDev}
  expiration: 86400000

gateway:
  internal-auth-token: ${GATEWAY_INTERNAL_AUTH_TOKEN:local-gateway-token}

server:
  port: 8089

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:${spring.application.name}}
    prefer-ip-address: false

management:
  endpoints:
    web:
      exposure:
        include: "*"
    endpoint:
      health:
        show-details: always
  endpoint:
    health:
      access: permitAll
    info:
      access: permitAll

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: WARN
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
    root: INFO