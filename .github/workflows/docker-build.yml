name: Docker Build

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: discovery-service
            context: .
            file: discovery-service/Dockerfile
          - name: user-service
            context: .
            file: user-service/Dockerfile
          - name: auth-service
            context: .
            file: auth-service/Dockerfile
          - name: chat-service
            context: .
            file: chat-service/Dockerfile
          - name: api-gateway
            context: .
            file: api-gateway/Dockerfile
          - name: frontend
            context: webchat_frontend
            file: webchat_frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} with BuildKit cache
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          load: true
          tags: webchat-${{ matrix.name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
