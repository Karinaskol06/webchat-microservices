server:
  port: 8083

spring:
  application:
    name: chat-service

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true
      # Parse multipart only in the controller so JWT / gateway auth runs on the initial request.
      resolve-lazily: true

  security:
    filter:
      # Only the initial servlet request — avoid a second security pass on ERROR dispatch (multipart).
      dispatcher-types: request

  data:
    mongodb:
      uri: mongodb://${MONGO_USER:}:${MONGO_PASSWORD:}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:messages_db}?authSource=${MONGO_AUTH_DB:admin}
      database: messages_db
      auto-index-creation: true

    redis:
      host: ${REDIS_HOST:redis}
      password: ${REDIS_PASSWORD:}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms
      connect-timeout: 3000ms
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 2147483647
      properties:
        enable.idempotence: true

websocket:
  endpoint: /ws/chat
  allowed-origins: "*"
  message-size-limit: 32768
  buffer-size: 51200

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForLocalDev}
  expiration: 86400000

gateway:
  internal-auth-token: ${GATEWAY_INTERNAL_AUTH_TOKEN:local-gateway-token}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  upload:
    dir: ${APP_UPLOAD_DIR:./storage/chat-uploads}
    max-size: 10485760  # 10 MB
    allowed-extensions: jpg,jpeg,png,gif,pdf,txt,doc,docx,xls,xlsx,mp4
  kafka:
    topics:
      message-created: ${KAFKA_TOPIC_MESSAGE_CREATED:chat.message.created.v1}

logging:
  level:
    com.project.webchat.chat: INFO
    org.springframework.web.socket: INFO
    org.springframework.data.mongodb: WARN
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
    root: INFO