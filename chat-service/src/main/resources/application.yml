server:
  port: 8083

spring:
  application:
    name: chat-service

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

  data:
    mongodb:
      uri: mongodb://${MONGO_USER:}:${MONGO_PASSWORD:}@${MONGO_HOST:localhost}:27017/${MONGO_DB:messages_db}
      database: messages_db
      auto-index-creation: true

    redis:
      host: ${REDIS_HOST:redis}
      password: ${REDIS_PASSWORD:}
      port: 6379
      timeout: 5000ms
      connect-timeout: 3000ms

websocket:
  endpoint: /ws/chat
  allowed-origins: "*"
  message-size-limit: 32768
  buffer-size: 51200

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForLocalDev}
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  upload:
    dir: ./uploads
    max-size: 10485760  # 10 MB
    allowed-extensions: jpg,jpeg,png,gif,pdf,txt,doc,docx,xls,xlsx,mp4

logging:
  level:
    com.project.webchat.chat: INFO
    org.springframework.web.socket: INFO
    org.springframework.data.mongodb: WARN
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
    root: INFO