server:
  port: 8084

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notification_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:11111}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:notification-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.project.webchat.shared.events.v1
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          secret: ${JWT_SECRET:defaultSecretKeyForLocalDev}

app:
  kafka:
    topics:
      message-created: ${KAFKA_TOPIC_MESSAGE_CREATED:chat.message.created.v1}
      message-created-dlq: ${KAFKA_TOPIC_MESSAGE_CREATED_DLQ:chat.message.created.v1.dlq}
      message-reaction: ${KAFKA_TOPIC_MESSAGE_REACTION:chat.message.reaction.v1}
      message-reaction-dlq: ${KAFKA_TOPIC_MESSAGE_REACTION_DLQ:chat.message.reaction.v1.dlq}
      room-member-invited: ${KAFKA_TOPIC_ROOM_MEMBER_INVITED:chat.room.member.invited.v1}
      room-member-invited-dlq: ${KAFKA_TOPIC_ROOM_MEMBER_INVITED_DLQ:chat.room.member.invited.v1.dlq}
  vapid:
    public-key: ${VAPID_PUBLIC_KEY:}
    private-key: ${VAPID_PRIVATE_KEY:}
    subject: ${VAPID_SUBJECT:mailto:admin@webchat.local}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.project.webchat.notification: INFO
    org.springframework.security: WARN
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
    root: INFO
