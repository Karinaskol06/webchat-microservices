server:
  port: 8082

spring:
  application:
    name: auth-service
  config:
    # Load repo-level .env when running auth-service directly from IDE/Maven in dev mode.
    import: optional:file:../.env[.properties]
  cloud:
    openfeign:
      enabled: true
      httpclient:
        enabled: true
  security:
    user:
      name: admin
      password: 11111

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      connect-timeout: 3000ms
      client-type: lettuce
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 2000ms
        shutdown-timeout: 200ms

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForLocalDev}
  expiration: 86400000

password-reset:
  token-ttl: ${PASSWORD_RESET_TOKEN_TTL:1h}
  frontend-base-url: ${PASSWORD_RESET_FRONTEND_URL:http://localhost:5173}
  rate-limit-max-requests: ${PASSWORD_RESET_RATE_LIMIT_MAX:3}
  rate-limit-window: ${PASSWORD_RESET_RATE_LIMIT_WINDOW:15m}
  public-message: "If an account exists for that email, you will receive password reset instructions shortly."

app:
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@webchat.local}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
    healthcheck:
      enabled: true
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:${spring.application.name}}
    prefer-ip-address: false

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic
      user-service:
        connectTimeout: 3000
        readTimeout: 3000

management:
  health:
    mail:
      # Mail starter is on the classpath for optional password-reset emails; do not fail
      # startup/health when SMTP is not configured (set MAIL_ENABLED=false to log reset links).
      enabled: ${MAIL_HEALTH_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: "*"
        exclude: env,beans
    endpoint:
      health:
        show-details: always
        access: permitAll
      info:
        access: permitAll
      shutdown:
        enabled: true
      beans:
        enabled: true
      env:
        enabled: true

logging:
  level:
    com.project.webchat.auth: INFO
    org.springframework.security: WARN
    org.springframework.data.redis: WARN
    com.netflix.eureka: WARN
    root: INFO