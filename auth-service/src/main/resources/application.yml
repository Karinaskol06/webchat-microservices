server:
  port: 8082

spring:
  application:
    name: auth-service
  cloud:
    openfeign:
      enabled: true
      httpclient:
        enabled: true
  security:
    user:
      name: admin
      password: 11111

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      connect-timeout: 3000ms
      client-type: lettuce
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 2000ms
        shutdown-timeout: 200ms

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForLocalDev}
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
    healthcheck:
      enabled: true
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:${spring.application.name}}
    prefer-ip-address: false

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic
      user-service:
        connectTimeout: 3000
        readTimeout: 3000

management:
  endpoints:
    web:
      exposure:
        include: "*"
        exclude: env,beans
    endpoint:
      health:
        show-details: always
        access: permitAll
      info:
        access: permitAll
      shutdown:
        enabled: true
      beans:
        enabled: true
      env:
        enabled: true

logging:
  level:
    com.project.webchat.auth: INFO
    org.springframework.security: WARN
    org.springframework.data.redis: WARN
    com.netflix.eureka: WARN
    root: INFO